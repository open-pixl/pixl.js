name: packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@open-pixl"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.10.0 --activate

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build protocol package
        run: pnpm --filter @open-pixl/protocol build

      - name: Publish protocol package
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        run: pnpm --filter @open-pixl/protocol publish --no-git-checks

  firmware-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: tools/firmware-container/Dockerfile
          push: true
          tags: ghcr.io/open-pixl/pixljs-firmware-builder:latest
