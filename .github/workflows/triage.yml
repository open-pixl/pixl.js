name: triage

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) return;
            const text = `${issue.title}\n${issue.body || ""}`.toLowerCase();
            const existing = new Set(issue.labels.map((label) => label.name));
            const labels = new Set();

            if (![...existing].some((name) => name.startsWith("gtd:"))) labels.add("gtd:inbox");
            if (![...existing].some((name) => name.startsWith("area:"))) {
              if (/(dfu|ota|bootloader|signing|release key)/.test(text)) labels.add("area:dfu");
              if (/(firmware|nfc|amiibo|settings|return key|screen|display)/.test(text)) labels.add("area:firmware");
              if (/(web|browser|chrome|edge|pages|vite|mobile)/.test(text)) labels.add("area:web");
              if (/(translation|locale|i18n|string)/.test(text)) labels.add("area:i18n");
              if (/(hardware|vendor|battery|lcd|oled|connector|buyer)/.test(text)) labels.add("area:hardware");
              if (/(workflow|ci|package|ghcr|github action|infra)/.test(text)) labels.add("area:infra");
            }

            const specEligible = existing.has("type:bug") || existing.has("type:feature") || existing.has("type:spec") ||
              ![...existing].some((name) => name.startsWith("type:"));
            if (specEligible && /(dfu|ota|bootloader|settings|protocol|i18n generator|persistent ux|migration|rollback)/.test(text)) {
              labels.add("needs-spec");
            }

            if (labels.size === 0) return;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels].filter((label) => !existing.has(label)),
            });
